<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Cloud Chatbot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:420px;
    height:700px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
    display:flex;
    flex-direction:column;
}

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

.header h2{
    font-size:24px;
}

.header p{
    font-size:14px;
    opacity:.9;
}

.chat-box{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:#f5f7fb;
}

.message{
    max-width:80%;
    padding:12px 16px;
    border-radius:18px;
    margin-bottom:15px;
    line-height:1.5;
    animation:fade .2s ease;
}

.user{
    background:#2563eb;
    color:white;
    margin-left:auto;
}

.bot{
    background:white;
    border:1px solid #ddd;
}

.input-area{
    display:flex;
    padding:15px;
    border-top:1px solid #ddd;
    background:white;
}

input{
    flex:1;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    outline:none;
    font-size:15px;
}

button{
    margin-left:10px;
    border:none;
    background:#2563eb;
    color:white;
    padding:15px 22px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.typing{
    color:#666;
    font-style:italic;
    margin-bottom:10px;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#bbb;
border-radius:10px;
}
</style>

</head>
<body>

<div class="chat-container">

<div class="header">
<h2>AI Cloud Assistant</h2>
<p>Powered by OpenAI</p>
</div>

<div id="chatBox" class="chat-box">

<div class="message bot">
👋 Hello! I'm your AI Assistant.<br><br>
How can I help you today?
</div>

</div>

<div class="input-area">

<input
id="message"
placeholder="Type your message..."
onkeypress="if(event.key==='Enter')sendMessage()">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

async function sendMessage(){

const input=document.getElementById("message");
const text=input.value.trim();

if(text==="") return;

const chat=document.getElementById("chatBox");

chat.innerHTML+=`
<div class="message user">
${text}
</div>
`;

input.value="";

chat.innerHTML+=`
<div class="typing" id="typing">
AI is typing...
</div>
`;

chat.scrollTop=chat.scrollHeight;

try{

const response=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

});

const data=await response.json();

document.getElementById("typing").remove();

chat.innerHTML+=`
<div class="message bot">
${data.reply}
</div>
`;

chat.scrollTop=chat.scrollHeight;

}catch(error){

document.getElementById("typing").remove();

chat.innerHTML+=`
<div class="message bot">
❌ Server connection failed.
</div>
`;

}

}

</script>

</body>
</html>
